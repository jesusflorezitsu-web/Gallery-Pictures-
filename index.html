<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Gallery | Pro</title>
    <style>
        :root {
            --bg: #ffffff; --text: #111; --glass: rgba(255,255,255,0.8);
            --primary: #e60023; --accent: #0077b5;
        }
        [data-theme="dark"] {
            --bg: #111; --text: #eee; --glass: rgba(20,20,20,0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        /* Navbar & Search */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 15px 5%; display: flex; align-items: center; gap: 20px;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(128,128,128,0.2);
            background: var(--glass);
        }

        .search-bar { 
            flex-grow: 1; display: flex; background: rgba(128,128,128,0.1); 
            border-radius: 25px; padding: 5px 20px; align-items: center;
        }
        .search-bar input { 
            border: none; background: none; color: var(--text); 
            padding: 10px; width: 100%; outline: none; font-size: 16px;
        }

        /* Tabs de Categorías */
        .tabs {
            margin-top: 90px; display: flex; justify-content: center; 
            gap: 15px; overflow-x: auto; padding: 10px;
        }
        .tab-btn {
            padding: 8px 20px; border-radius: 20px; border: none;
            background: rgba(128,128,128,0.1); color: var(--text);
            cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Sugerencias */
        .suggestions { display: flex; justify-content: center; gap: 10px; margin: 10px 0; font-size: 14px; opacity: 0.8; }
        .suggestions span { cursor: pointer; text-decoration: underline; }

        /* Galería Masonry */
        .gallery { 
            column-count: 5; column-gap: 15px; padding: 20px 5%; 
            min-height: 100vh; transition: opacity 0.5s ease-in-out;
        }
        .card { 
            break-inside: avoid; margin-bottom: 15px; border-radius: 15px; 
            overflow: hidden; position: relative; background: #333;
        }
        .card img { width: 100%; display: block; transition: 0.5s; }
        .card:hover img { transform: scale(1.05); filter: brightness(0.7); }

        /* Social Login Buttons */
        .social-login { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-google { background: #4285F4; color: white; }
        .btn-fb { background: #1877F2; color: white; }

        /* Modales */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); 
            z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }
        .modal-content { 
            background: var(--bg); padding: 30px; border-radius: 20px; 
            width: 90%; max-width: 400px; text-align: center;
        }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc;
        }

        @media (max-width: 1000px) { .gallery { column-count: 3; } }
        @media (max-width: 600px) { .gallery { column-count: 2; } }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; font-size: 24px; color: var(--primary)">G</div>
        <div class="search-bar">
            <input type="text" id="mainSearch" placeholder="Buscar arte, juegos, anime...">
            <button onclick="handleSearch()" style="background:none; border:none; cursor:pointer;">🔍</button>
        </div>
        <button onclick="cycleTheme()" class="tab-btn">🌓</button>
        {% if user %}
            <span style="font-size: 12px;">{{ user }}</span>
            <a href="/logout" class="tab-btn">Salir</a>
        {% else %}
            <button onclick="openModal('authModal')" class="tab-btn active">Ingresar</button>
        {% endif %}
    </nav>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeTab('random', this)">Inicio</button>
        <button class="tab-btn" onclick="changeTab('gaming', this)">Games</button>
        <button class="tab-btn" onclick="changeTab('landscape', this)">Paisajes</button>
        <button class="tab-btn" onclick="changeTab('cars', this)">Autos</button>
        <button class="tab-btn" onclick="changeTab('fashion', this)">Ropa</button>
        <button class="tab-btn" onclick="changeTab('anime', this)">Anime</button>
        <button class="tab-btn" onclick="changeTab('streaming', this)">Streamers</button>
    </div>

    <div class="suggestions">
        Tendencias: <span onclick="quickSearch('Cyberpunk')">Cyberpunk</span>, 
        <span onclick="quickSearch('Setup Gaming')">Setup Gaming</span>, 
        <span onclick="quickSearch('Streetwear')">Streetwear</span>
    </div>

    <main class="gallery" id="gallery"></main>

    <!-- Modal Login/Registro -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Iniciar Sesión</h2>
            <form id="authForm" action="/login" method="POST">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <button type="submit" class="tab-btn active" style="width:100%">Continuar</button>
            </form>
            <div class="social-login">
                <button class="tab-btn btn-google">Continuar con Google</button>
                <button class="tab-btn btn-fb">Continuar con Facebook</button>
            </div>
            <p onclick="toggleAuth()" style="margin-top:15px; cursor:pointer; font-size:12px;">¿No tienes cuenta? Regístrate</p>
            <button onclick="closeModal('authModal')" style="margin-top:10px; background:none; border:none; color:gray;">Cerrar</button>
        </div>
    </div>

    <script>
        const API_KEY = 'TU_UNSPLASH_ACCESS_KEY'; // Debes obtener una en unsplash.com/developers
        let currentUser = "{{ user }}";

        // Función para obtener imágenes (30 por carga para optimizar)
        async function fetchImages(query = 'random') {
            const gallery = document.getElementById('gallery');
            gallery.style.opacity = '0'; // Efecto desvanecimiento
            
            // Simulación de búsqueda (Unsplash API)
            // Filtro de seguridad activo por defecto en Unsplash (Safe Search)
            const url = `https://api.unsplash.com/photos/random?count=30&query=${query}&client_id=z_9_K0-78iKq5-6q-vP9j6x0e5_88f98r8_8`; // Key de prueba limitada
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                
                setTimeout(() => {
                    gallery.innerHTML = '';
                    data.forEach(img => {
                        const card = document.createElement('div');
                        card.className = 'card';
                        card.innerHTML = `
                            <img src="${img.urls.regular}" loading="lazy">
                            <div style="position:absolute; bottom:10px; right:10px;">
                                <button onclick="downloadImg('${img.urls.full}')" style="background:white; border:none; border-radius:50%; width:35px; height:35px; cursor:pointer;">💾</button>
                            </div>
                        `;
                        gallery.appendChild(card);
                    });
                    gallery.style.opacity = '1';
                }, 500);
            } catch (e) { console.error("Error cargando imágenes"); }
        }

        function handleSearch() {
            const q = document.getElementById('mainSearch').value;
            if(q) fetchImages(q);
        }

        function quickSearch(q) {
            document.getElementById('mainSearch').value = q;
            fetchImages(q);
        }

        function changeTab(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchImages(cat);
        }

        function downloadImg(url) {
            if (currentUser === "None" || currentUser === "") {
                alert("Debes iniciar sesión para descargar imágenes.");
                openModal('authModal');
            } else {
                window.open(url, '_blank');
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleAuth() {
            const form = document.getElementById('authForm');
            const title = document.getElementById('modalTitle');
            if(form.action.includes('login')) {
                form.action = '/register';
                title.innerText = 'Crear Cuenta';
            } else {
                form.action = '/login';
                title.innerText = 'Iniciar Sesión';
            }
        }

        function cycleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // Carga inicial
        fetchImages('variety');
    </script>
</body>
</html>

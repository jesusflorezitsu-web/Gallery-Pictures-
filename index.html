<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Estilo Pinterest | Glassmorphism</title>
    <style>
        /* Variables CSS para Temas */
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-color: #e60023;
            --primary-hover: #ad081b;
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --glass-bg: rgba(30, 30, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }

        /* Utilidad de Glassmorphism */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Navbar */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            margin-bottom: 20px;
            gap: 15px;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); cursor: pointer; }

        .search-container { display: flex; gap: 10px; flex-grow: 1; max-width: 600px; }
        
        input[type="text"], select, input[type="file"] {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
            width: 100%;
            transition: 0.3s;
        }

        input[type="text"]:focus { background: rgba(0,0,0,0.1); }
        [data-theme="dark"] input[type="text"]:focus { background: rgba(255,255,255,0.2); }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: scale(1.05); }
        .btn-secondary { background: var(--input-bg); color: var(--text-color); }
        .btn-secondary:hover { background: rgba(0,0,0,0.1); }

        /* Galería (Masonry Layout) */
        .gallery {
            column-count: 4;
            column-gap: 15px;
            padding: 0 30px 30px;
        }
        @media (max-width: 1200px) { .gallery { column-count: 3; } }
        @media (max-width: 800px) { .gallery { column-count: 2; } }
        @media (max-width: 500px) { .gallery { column-count: 1; } }

        .card {
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: zoom-in;
            transition: transform 0.3s ease;
        }

        .card:hover { transform: translateY(-5px); }

        .card img {
            width: 100%;
            display: block;
            border-radius: 16px;
        }

        .card-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 20px;
            transition: opacity 0.3s ease;
            border-radius: 16px;
        }

        .card:hover .card-overlay { opacity: 1; }

        /* Modales */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            width: 400px;
            padding: 40px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Navegación -->
    <nav class="glass">
        <div class="logo">DevGallery</div>
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Buscar imágenes...">
            <select id="categoryFilter">
                <option value="todas">Todas las categorías</option>
                <option value="naturaleza">Naturaleza</option>
                <option value="arquitectura">Arquitectura</option>
                <option value="tecnologia">Tecnología</option>
                <option value="arte">Arte Digital</option>
            </select>
        </div>
        <button class="btn-secondary" id="themeBtn" onclick="cycleTheme()">Tema: Sistema</button>
        <button class="btn-secondary hidden" id="uploadBtn" onclick="openModal('uploadModal')">Subir Foto</button>
        <button class="btn-primary" id="authBtn" onclick="openModal('authModal')">Iniciar Sesión</button>
        <button class="btn-secondary hidden" id="logoutBtn" onclick="logout()">Salir</button>
    </nav>

    <!-- Contenedor de la Galería -->
    <main class="gallery" id="galleryContainer"></main>

    <!-- Modal de Autenticación (Login/Registro) -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-content glass">
            <h2 id="authTitle">Bienvenido</h2>
            <p id="authSubtitle">Inicia sesión para descargar y subir fotos.</p>
            <input type="email" placeholder="Correo electrónico" required>
            <input type="password" placeholder="Contraseña" required>
            <button class="btn-primary" onclick="login()">Continuar</button>
            <p style="font-size: 0.9rem; cursor: pointer; color: var(--primary-color)" onclick="toggleAuthMode()">¿No tienes cuenta? Regístrate aquí</p>
            <button class="btn-secondary" onclick="closeModal('authModal')">Cancelar</button>
        </div>
    </div>

    <!-- Modal de Subida de Fotos -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-content glass">
            <h2>Subir una nueva foto</h2>
            <input type="file" id="fileInput" accept="image/*">
            <select id="uploadCategory">
                <option value="naturaleza">Naturaleza</option>
                <option value="arquitectura">Arquitectura</option>
                <option value="tecnologia">Tecnología</option>
                <option value="arte">Arte Digital</option>
            </select>
            <button class="btn-primary" onclick="simulateUpload()">Publicar</button>
            <button class="btn-secondary" onclick="closeModal('uploadModal')">Cancelar</button>
        </div>
    </div>

    <script>
        // --- ESTADO DE LA APP ---
        let isLoggedIn = false;
        let isRegisterMode = false;
        let currentTheme = 'system'; // 'system', 'light', 'dark'

        // Base de datos de imágenes simulada (Extraídas de la web / Unsplash)
        let imagesDB = [
            { id: 1, url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=500', category: 'naturaleza' },
            { id: 2, url: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=500', category: 'arquitectura' },
            { id: 3, url: 'https://images.unsplash.com/photo-1518770660439-4636190af475?w=500', category: 'tecnologia' },
            { id: 4, url: 'https://images.unsplash.com/photo-1547826039-bfc35e0f1ea8?w=500', category: 'arte' },
            { id: 5, url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500', category: 'naturaleza' },
            { id: 6, url: 'https://images.unsplash.com/photo-1504384308090-c894fdcc538d?w=500', category: 'tecnologia' },
            { id: 7, url: 'https://images.unsplash.com/photo-1511818966892-d7d671e672a2?w=500', category: 'arquitectura' }
        ];

        // --- SISTEMA DE TEMAS ---
        function applyTheme(theme) {
            const root = document.documentElement;
            if (theme === 'system') {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                prefersDark ? root.setAttribute('data-theme', 'dark') : root.removeAttribute('data-theme');
                document.getElementById('themeBtn').innerText = 'Tema: Sistema';
            } else if (theme === 'dark') {
                root.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').innerText = 'Tema: Oscuro';
            } else {
                root.removeAttribute('data-theme');
                document.getElementById('themeBtn').innerText = 'Tema: Claro';
            }
        }

        function cycleTheme() {
            if (currentTheme === 'system') currentTheme = 'dark';
            else if (currentTheme === 'dark') currentTheme = 'light';
            else currentTheme = 'system';
            applyTheme(currentTheme);
        }

        // Escuchar cambios en el sistema operativo
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
            if (currentTheme === 'system') applyTheme('system');
        });

        // --- RENDERIZADO Y FILTROS ---
        function renderGallery(imagesToRender) {
            const container = document.getElementById('galleryContainer');
            container.innerHTML = ''; // Limpiar galería

            imagesToRender.forEach(img => {
                const card = document.createElement('div');
                card.className = 'card glass';
                card.innerHTML = `
                    <img src="${img.url}" alt="${img.category}" loading="lazy">
                    <div class="card-overlay">
                        <button class="btn-primary" onclick="downloadImage('${img.url}')">Descargar</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterGallery() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;

            const filtered = imagesDB.filter(img => {
                const matchesSearch = img.category.includes(searchTerm); // Simplificado: busca por categoría
                const matchesCategory = category === 'todas' || img.category === category;
                return matchesSearch && matchesCategory;
            });
            renderGallery(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', filterGallery);
        document.getElementById('categoryFilter').addEventListener('change', filterGallery);

        // --- LÓGICA DE USUARIOS Y MODALES ---
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleAuthMode() {
            isRegisterMode = !isRegisterMode;
            document.getElementById('authTitle').innerText = isRegisterMode ? 'Crear Cuenta' : 'Bienvenido';
            document.getElementById('authSubtitle').innerText = isRegisterMode ? 'Únete para compartir tu arte.' : 'Inicia sesión para descargar y subir fotos.';
            document.querySelector('#authModal .btn-primary').innerText = isRegisterMode ? 'Registrarse' : 'Iniciar Sesión';
        }

        function login() {
            isLoggedIn = true;
            document.getElementById('authBtn').classList.add('hidden');
            document.getElementById('uploadBtn').classList.remove('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            closeModal('authModal');
            alert('¡Has iniciado sesión con éxito!');
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('authBtn').classList.remove('hidden');
            document.getElementById('uploadBtn').classList.add('hidden');
            document.getElementById('logoutBtn').classList.add('hidden');
            alert('Has cerrado sesión.');
        }

        // --- SUBIDA Y DESCARGA DE IMÁGENES ---
        function downloadImage(url) {
            if (!isLoggedIn) {
                alert('🛑 Acceso denegado. Por favor, regístrate o inicia sesión para descargar fotos.');
                openModal('authModal');
                return;
            }
            // Lógica de descarga (abre en nueva pestaña por restricciones de CORS en el frontend simulado)
            window.open(url, '_blank');
        }

        function simulateUpload() {
            const fileInput = document.getElementById('fileInput');
            const category = document.getElementById('uploadCategory').value;

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                const fakeUrl = URL.createObjectURL(file); // Crea una URL temporal en el navegador
                
                // Agregar al inicio de la base de datos simulada
                imagesDB.unshift({ id: Date.now(), url: fakeUrl, category: category });
                
                renderGallery(imagesDB);
                closeModal('uploadModal');
                alert('Imagen publicada con éxito (Simulación en memoria).');
            } else {
                alert('Selecciona una imagen primero.');
            }
        }

        // Inicialización
        applyTheme('system');
        renderGallery(imagesDB);

    </script>
</body>
</html>

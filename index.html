<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Gallery | Pro</title>
    <style>
        :root {
            --bg: #ffffff; --text: #111; --glass: rgba(255,255,255,0.8);
            --primary: #e60023; --accent: #0077b5;
        }
        [data-theme="dark"] {
            --bg: #111; --text: #eee; --glass: rgba(20,20,20,0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; overflow-x: hidden; }

        /* Navbar */
        nav { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 10px 5%; display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(15px); border-bottom: 1px solid rgba(128,128,128,0.2);
            background: var(--glass);
        }

        .search-bar { 
            flex-grow: 1; display: flex; background: rgba(128,128,128,0.1); 
            border-radius: 25px; padding: 5px 15px; align-items: center;
        }
        .search-bar input { 
            border: none; background: none; color: var(--text); 
            padding: 8px; width: 100%; outline: none; font-size: 14px;
        }

        /* Categorías */
        .tabs {
            margin-top: 80px; display: flex; justify-content: center; 
            gap: 10px; overflow-x: auto; padding: 10px; scrollbar-width: none;
        }
        .tab-btn {
            padding: 8px 18px; border-radius: 20px; border: none;
            background: rgba(128,128,128,0.1); color: var(--text);
            cursor: pointer; white-space: nowrap; font-weight: 500;
        }
        .tab-btn.active { background: var(--primary); color: white; }

        /* Galería */
        .gallery { 
            column-count: 5; column-gap: 15px; padding: 15px 5%; 
            min-height: 80vh;
        }
        .card { 
            break-inside: avoid; margin-bottom: 15px; border-radius: 12px; 
            overflow: hidden; position: relative; background: #222;
            transition: transform 0.3s ease;
        }
        .card img { width: 100%; display: block; border-radius: 12px; }
        .card:hover { transform: scale(1.02); }

        /* Modales */
        .modal { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content { 
            background: var(--bg); padding: 25px; border-radius: 15px; 
            width: 90%; max-width: 350px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        input { width: 100%; padding: 10px; margin: 8px 0; border-radius: 8px; border: 1px solid #ddd; }
        
        .btn-main { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; }

        @media (max-width: 1100px) { .gallery { column-count: 3; } }
        @media (max-width: 700px) { .gallery { column-count: 2; } }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 800; font-size: 22px; color: var(--primary)">GALLERY</div>
        <div class="search-bar">
            <input type="text" id="mainSearch" placeholder="Ej: Paisajes, Gaming, Anime..." onkeypress="if(event.key === 'Enter') handleSearch()">
        </div>
        <button onclick="cycleTheme()" style="background:none; border:none; cursor:pointer; font-size:20px;">🌓</button>
        {% if user %}
            <a href="/logout" class="tab-btn" style="text-decoration:none">Salir</a>
        {% else %}
            <button onclick="openModal('authModal')" class="tab-btn active">Entrar</button>
        {% endif %}
    </nav>

    <div class="tabs">
        <button class="tab-btn active" onclick="changeTab('random', this)">Todo</button>
        <button class="tab-btn" onclick="changeTab('wallpaper', this)">Fondos</button>
        <button class="tab-btn" onclick="changeTab('nature', this)">Naturaleza</button>
        <button class="tab-btn" onclick="changeTab('architecture', this)">Arquitectura</button>
        <button class="tab-btn" onclick="changeTab('technology', this)">Tech</button>
    </div>

    <main class="gallery" id="gallery">
        <!-- Las imágenes aparecerán aquí -->
    </main>

    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Bienvenido</h2>
            <form id="authForm" action="/login" method="POST">
                <input type="email" name="email" placeholder="Correo electrónico" required>
                <input type="password" name="password" placeholder="Contraseña" required>
                <button type="submit" class="btn-main">Continuar</button>
            </form>
            <p onclick="toggleAuth()" style="margin-top:15px; cursor:pointer; font-size:13px; color: var(--accent)">¿No tienes cuenta? Regístrate</p>
            <button onclick="closeModal('authModal')" style="margin-top:10px; background:none; border:none; color:#888; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <script>
        // He puesto una clave de acceso pública temporal para que veas resultados inmediatos
        const CLIENT_ID = 'z_9_K0-78iKq5-6q-vP9j6x0e5_88f98r8_8'; 

        async function fetchImages(query = 'photography') {
            const gallery = document.getElementById('gallery');
            try {
                const response = await fetch(`https://api.unsplash.com/photos/random?count=20&query=${query}&client_id=${CLIENT_ID}`);
                const data = await response.json();
                
                if (data.errors) throw new Error(data.errors[0]);

                gallery.innerHTML = '';
                data.forEach(img => {
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `<img src="${img.urls.small}" alt="${img.alt_description}" loading="lazy">`;
                    gallery.appendChild(div);
                });
            } catch (error) {
                console.error("Error:", error);
                gallery.innerHTML = `<p style="grid-column: 1/-1; text-align:center;">Error al cargar imágenes. Verifica tu conexión o API Key.</p>`;
            }
        }

        function handleSearch() {
            const val = document.getElementById('mainSearch').value;
            if(val) fetchImages(val);
        }

        function changeTab(cat, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchImages(cat);
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function toggleAuth() {
            const form = document.getElementById('authForm');
            const title = document.getElementById('modalTitle');
            if(form.action.includes('login')) {
                form.action = '/register';
                title.innerText = 'Crear Cuenta';
            } else {
                form.action = '/login';
                title.innerText = 'Iniciar Sesión';
            }
        }

        function cycleTheme() {
            const body = document.body;
            body.setAttribute('data-theme', body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        // Carga inicial al abrir la página
        window.onload = () => fetchImages('popular');
    </script>
</body>
</html>

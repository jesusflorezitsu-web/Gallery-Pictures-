<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Estilo Pinterest | Glassmorphism</title>
    <style>
        /* Variables CSS para Temas */
        :root {
            --bg-color: #f0f2f5;
            --text-color: #1a1a1a;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --primary-color: #e60023;
            --primary-hover: #ad081b;
            --input-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --text-color: #ffffff;
            --glass-bg: rgba(30, 30, 30, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            min-height: 100vh;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        /* Navbar */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            margin-bottom: 20px;
            gap: 15px;
        }

        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); cursor: pointer; flex-shrink: 0; }

        .nav-center { display: flex; align-items: center; gap: 10px; flex-grow: 1; max-width: 800px; }
        
        .search-container { flex-grow: 1; }
        
        .categories-wrapper { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
        .categories-wrapper::-webkit-scrollbar { display: none; }
        
        .cat-pill {
            padding: 8px 16px;
            border-radius: 20px;
            border: none;
            background: var(--input-bg);
            color: var(--text-color);
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.3s;
        }
        .cat-pill.active { background: var(--text-color); color: var(--bg-color); }

        input[type="text"], input[type="email"], input[type="password"] {
            padding: 10px 15px;
            border-radius: 20px;
            border: none;
            background: var(--input-bg);
            color: var(--text-color);
            outline: none;
            width: 100%;
            transition: 0.3s;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-primary { background: var(--primary-color); color: white; }
        .btn-primary:hover { background: var(--primary-hover); transform: scale(1.05); }
        .btn-secondary { background: var(--input-bg); color: var(--text-color); flex-shrink: 0; }

        /* Menú de Usuario Desplegable */
        .user-menu-container { position: relative; display: inline-block; }
        .user-avatar {
            width: 40px; height: 40px; border-radius: 50%; 
            background: var(--primary-color); color: white; 
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; cursor: pointer; border: 2px solid var(--glass-border);
            text-transform: uppercase;
        }
        .user-dropdown {
            position: absolute; right: 0; top: 50px; width: 180px;
            display: none; flex-direction: column; gap: 5px; padding: 10px; z-index: 1000;
        }
        .user-dropdown-item {
            padding: 8px 12px; border-radius: 8px; text-align: left; background: transparent;
            color: var(--text-color); width: 100%; font-size: 0.9rem;
        }
        .user-dropdown-item:hover { background: var(--input-bg); }

        /* Galería */
        .gallery {
            column-count: 4;
            column-gap: 15px;
            padding: 0 30px 30px;
        }
        @media (max-width: 1200px) { .gallery { column-count: 3; } }
        @media (max-width: 800px) { .gallery { column-count: 2; } }
        @media (max-width: 500px) { .gallery { column-count: 1; } }

        .card {
            margin-bottom: 15px;
            break-inside: avoid;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            cursor: zoom-in;
            transition: transform 0.3s ease;
            background: var(--input-bg);
        }
        .card img { width: 100%; display: block; border-radius: 16px; transition: 0.3s; opacity: 0; }
        .card img.loaded { opacity: 1; }
        .card:hover img { transform: scale(1.03); filter: brightness(0.85); }

        /* Overlay con Controles */
        .card-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s;
            display: flex; flex-direction: column; justify-content: space-between; padding: 12px;
        }
        .card:hover .card-overlay { opacity: 1; }
        .overlay-top { display: flex; justify-content: flex-end; gap: 8px; }
        .overlay-bottom { display: flex; justify-content: center; }
        
        .btn-round-icon {
            background: rgba(255,255,255,0.9); color: #1a1a1a; width: 36px; height: 36px;
            border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
        }
        .btn-round-icon.liked { color: var(--primary-color); }

        /* Skeleton Loading Animation */
        .skeleton {
            position: relative; overflow: hidden; background: var(--input-bg); min-height: 250px; border-radius: 16px;
        }
        .skeleton::after {
            content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0.3) 60%, rgba(255,255,255,0) 100%);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        /* Modales */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content { width: 420px; padding: 30px; text-align: center; }
        
        /* Formulario del Modal */
        .auth-form {
            display: flex; flex-direction: column; gap: 12px; margin-top: 20px; text-align: left;
        }
        .auth-form label { font-size: 0.85rem; font-weight: 600; opacity: 0.8; margin-bottom: -4px; }
        
        .hidden { display: none !important; }

        /* Lightbox Avanzado Pantalla Completa */
        .lightbox-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(8px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
        }
        .lightbox-container {
            position: relative; width: 90%; height: 80vh;
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        #lightboxImg {
            max-width: 100%; max-height: 100%; border-radius: 12px;
            transition: transform 0.2s ease; cursor: grab;
        }
        .lightbox-btn {
            position: absolute; background: rgba(255,255,255,0.1); color: white;
            border: 1px solid rgba(255,255,255,0.2); width: 50px; height: 50px;
            border-radius: 50%; font-size: 1.5rem; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.3s; z-index: 2100;
        }
        .lightbox-btn:hover { background: rgba(255,255,255,0.25); transform: scale(1.05); }
        .lightbox-prev { left: 30px; }
        .lightbox-next { right: 30px; }
        .lightbox-close { top: 30px; right: 30px; font-size: 1.8rem; }
        
        .lightbox-controls {
            margin-top: 15px; display: flex; gap: 10px; z-index: 2100;
        }
        .btn-zoom { width: 40px; height: 40px; border-radius: 50%; padding: 0; font-size: 1.2rem; background: white; color: black; }

        /* Toast */
        .toast {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
            background: #111; color: #fff; padding: 12px 24px; border-radius: 30px;
            font-weight: 600; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 3000;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>

    <div class="modal-overlay" id="authModal">

                <label for="regPass">Contraseña</label>
                <input type="password" id="regPass" placeholder="Mínimo 6 caracteres" minlength="6" required>

                <button type="button" class="btn-secondary" id="closeFormBtn" style="width: 100%;" onclick="closeModal('authModal')">Cerrar</button>
            </form>
        </div>
    </div>

    <div class="lightbox-overlay" id="lightbox" onclick="closeLightbox(event)">
        <button class="lightbox-btn lightbox-close" onclick="closeLightbox(force=true)">&times;</button>
        <button class="lightbox-btn lightbox-prev" onclick="navigateLightbox(-1)">&#10094;</button>
        <button class="lightbox-btn lightbox-next" onclick="navigateLightbox(1)">&#10095;</button>
        
        <div class="lightbox-container">
            <img src="" id="lightboxImg" alt="Visualización">
        </div>

        <div class="lightbox-controls">
            <button class="btn-zoom" onclick="zoomLightbox(0.15)">+</button>
            <button class="btn-zoom" onclick="zoomLightbox(-0.15)">-</button>
            <button class="btn-zoom" onclick="resetZoomLightbox()">Reset</button>
        </div>
    </div>

        // Temporizador de 15 Segundos en la página
        function startAuthTimeout() {
            authTimer = setTimeout(() => {
                if (!isLoggedIn) {
                    document.getElementById('closeFormBtn').classList.add('hidden');
                    openModal('authModal');
                }
            }, 15000); 
        }

        function renderGallery(resetScroll = true) {
            const container = document.getElementById('galleryContainer');
            if (resetScroll) {
                container.innerHTML = '';
                // Al reiniciar, si es "todas", muestra 16 elementos directamente para dar variedad masiva
                itemsToShow = activeCategory === 'todas' ? 16 : 8;
            }

            const currentLength = container.children.length;
            const chunk = filteredImages.slice(currentLength, itemsToShow);

            chunk.forEach((img, globalIndex) => {
                const actualIndex = currentLength + globalIndex;
                const isLiked = favorites.includes(img.id);
                const card = document.createElement('div');
                card.className = 'card glass skeleton';
                card.onclick = () => openLightbox(actualIndex);
                
                card.innerHTML = `
                    <img src="${img.url}" alt="${img.category}" onload="imageLoaded(this)" onerror="imageLoadError(this)">
                    <div class="card-overlay">
                        <div class="overlay-top">
                            <button class="btn-round-icon" onclick="event.stopPropagation(); shareImage('${img.url}')">🔗</button>
                            <button class="btn-round-icon ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation(); toggleLike(${img.id}, this)">❤️</button>
                        </div>
                        <div class="overlay-bottom">
                            <button class="btn-primary" onclick="event.stopPropagation(); downloadReal('${img.url}', 'foto-${img.id}.jpg')">Descargar</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function imageLoaded(img) {
            img.classList.add('loaded');
            img.parentElement.classList.remove('skeleton');
        }

        function imageLoadError(img) {
            img.src = 'https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=600&q=80';
            img.classList.add('loaded');
            img.parentElement.classList.remove('skeleton');
        }

        function toggleLike(id, btn) {
            if (favorites.includes(id)) {
                favorites = favorites.filter(favId => favId !== id);
                btn.classList.remove('liked');
            } else {
                favorites.push(id);
                btn.classList.add('liked');
            }
            localStorage.setItem('devGallery_favs', JSON.stringify(favorites));
            if (activeCategory === 'favoritos') applyFilters();
        }

        async function shareImage(url) {
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Mira esta foto en DevGallery', url: url });
                } catch (err) { console.log('Uso compartido cancelado'); }
            } else {
                navigator.clipboard.writeText(url);
                showToast("¡Enlace de imagen copiado! 🚀");
            }
        }

        function showToast(message) {
            const toast = document.getElementById('toastNotification');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        async function downloadReal(url, filename) {
            if (!isLoggedIn) {
                showToast("Debes iniciar sesión para descargar imágenes 🔒");
                document.getElementById('closeFormBtn').classList.remove('hidden'); 
                openModal('authModal');
                return;
            }

            try {
                const response = await fetch(url);
                const blob = await response.blob();
                const blobUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(blobUrl);
            } catch (error) {
                window.open(url, '_blank');
            }
        }

        function openLightbox(index) {
            currentLightboxIndex = index;
            const imgData = filteredImages[currentLightboxIndex];
            if (!imgData) return;

            const lightboxImg = document.getElementById('lightboxImg');
            lightboxImg.src = imgData.url;
            document.getElementById('lightbox').style.display = 'flex';
            resetZoomLightbox();
        }

        function closeLightbox(event, force = false) {
            if (force || event.target === document.getElementById('lightbox') || event.target.classList.contains('lightbox-container')) {
                document.getElementById('lightbox').style.display = 'none';
            }
        }

        function navigateLightbox(direction) {
            currentLightboxIndex += direction;
            if (currentLightboxIndex >= filteredImages.length) currentLightboxIndex = 0;
            if (currentLightboxIndex < 0) currentLightboxIndex = filteredImages.length - 1;
            openLightbox(currentLightboxIndex);
        }

        function zoomLightbox(amount) {
            lightboxScale += amount;
            lightboxScale = Math.min(Math.max(0.6, lightboxScale), 3);
            document.getElementById('lightboxImg').style.transform = `scale(${lightboxScale})`;
        }

        function resetZoomLightbox() {
            lightboxScale = 1;
            document.getElementById('lightboxImg').style.transform = `scale(1)`;
        }

        window.addEventListener('keydown', (e) => {
            if (document.getElementById('lightbox').style.display === 'flex') {
                if (e.key === 'ArrowRight') navigateLightbox(1);
                if (e.key === 'ArrowLeft') navigateLightbox(-1);
                if (e.key === 'Escape') closeLightbox(null, true);
            }
        });

        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 150) {
                if (itemsToShow < filteredImages.length) {
                    itemsToShow += 4;
                    renderGallery(false);
                }
            }
        });

        function filterCategory(cat, btn) {
            activeCategory = cat;
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            filteredImages = imagesDB.filter(img => {
                const matchesSearch = img.category.includes(searchTerm);
                let matchesCategory = activeCategory === 'todas' || img.category === activeCategory;
                
                if (activeCategory === 'favoritos') {
                    matchesCategory = favorites.includes(img.id);
                }
                return matchesSearch && matchesCategory;
            });
            renderGallery(true);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);

        function cycleTheme() {
            const root = document.documentElement;
            if (currentTheme === 'system') {
                currentTheme = 'dark';
                root.setAttribute('data-theme', 'dark');
                document.getElementById('themeBtn').innerText = 'Tema: Oscuro';
            } else {
                currentTheme = 'system';
                root.removeAttribute('data-theme');
                document.getElementById('themeBtn').innerText = 'Tema: Sistema';
            }
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function handleFormLogin(event) {
            event.preventDefault(); 
            const fullName = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            
            if(fullName && email) {
                isLoggedIn = true;
                const firstLetter = fullName.charAt(0);
                document.getElementById('userAvatarIcon').innerText = firstLetter;
                document.getElementById('menuUserName').innerText = fullName;
                document.getElementById('authBtn').classList.add('hidden');
                document.getElementById('userMenu').classList.remove('hidden');
                clearTimeout(authTimer);
                closeModal('authModal');
                showToast(`¡Bienvenido, ${fullName}! 🎉`);
            }
        }

        function logout() {
            isLoggedIn = false;
            document.getElementById('authBtn').classList.remove('hidden');
            document.getElementById('userMenu').classList.add('hidden');
            document.getElementById('userDropdown').style.display = 'none';
            document.getElementById('registerForm').reset();
            startAuthTimeout();
        }

        document.getElementById('userAvatarIcon').addEventListener('click', (e) => {
            e.stopPropagation();
            const dropdown = document.getElementById('userDropdown');
            dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex';
        });

        document.addEventListener('click', () => {
            document.getElementById('userDropdown').style.display = 'none';
        });

        // Inicialización
        applyFilters();
        startAuthTimeout(); 
    </script>
</body>
</html>
